<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GAP Logistics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:#ebebeb;color:#000;min-height:100vh}
.header{background:#fff;border-bottom:2px solid #000;padding:20px 16px 16px;position:sticky;top:0;z-index:10}
.logo-sub{font-size:10px;color:#888;letter-spacing:3px;text-align:right;margin:8px 0 16px;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat{border:2px solid #000;border-radius:8px;padding:10px 4px;text-align:center;background:#fff}
.stat-n{font-size:22px;font-weight:900}
.stat-l{font-size:9px;letter-spacing:1px;margin-top:3px;font-weight:900}
.list{padding:10px 10px 32px;display:flex;flex-direction:column;gap:8px}
.card{background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;border:2px solid #000;box-shadow:3px 3px 0 #000;transition:box-shadow .15s,transform .15s}
.card.open{border-color:#dc2626;box-shadow:3px 3px 0 #dc2626}
.card:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000}
.ctop{padding:14px 14px}
.crow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.container-num{font-family:'Courier New',monospace;font-size:20px;font-weight:900;color:#000;letter-spacing:1px;line-height:1.1}
.badge{font-size:11px;font-weight:900;padding:5px 11px;border-radius:4px;letter-spacing:.8px;flex-shrink:0;border:2px solid currentColor}
.cname{font-size:14px;color:#000;line-height:1.3;margin-bottom:12px;font-weight:700}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px}
.ml{font-size:13px;color:#000;font-weight:600}
.ml span{display:block;font-size:15px;font-weight:900;color:#000;margin-top:1px}
.ml.r{text-align:right}
.ml.full{grid-column:1/-1}
.ml.full span{font-size:14px}
.red{color:#dc2626}
.prog{margin-top:14px}
.prog-bar{height:6px;background:#ddd;border-radius:3px;overflow:hidden;border:1px solid #ccc}
.prog-fill{height:100%;border-radius:3px}
.prog-row{display:flex;justify-content:space-between;margin-top:5px}
.prog-row span{font-size:12px;color:#000;font-weight:700}
.cbody{border-top:2px solid #000;padding:14px 14px;display:flex;flex-direction:column;gap:8px}
.ev-row{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#f5f5f5;border-radius:8px;border:1.5px solid #ccc}
.etxt{font-size:13px;color:#000;line-height:1.5;font-weight:600}
.doc-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f5f5f5;border-radius:7px;border:1.5px solid #bbb}
.doc-name{font-size:13px;color:#000;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
.doc-ext{font-size:10px;color:#555;letter-spacing:1px;font-weight:900;background:#e0e0e0;padding:2px 6px;border-radius:3px}
.attach{display:flex;align-items:center;gap:8px;padding:12px;background:#f5f5f5;border-radius:8px;border:2px dashed #999;cursor:pointer}
.atxt{font-size:13px;color:#000;font-weight:700}
.maersk-btn{display:block;text-align:center;font-size:13px;color:#fff;padding:12px;background:#dc2626;border-radius:8px;text-decoration:none;letter-spacing:1.5px;font-weight:900}
.footer{border-top:2px solid #000;padding:10px 16px;text-align:center;background:#fff}
.footer span{font-size:9px;color:#555;letter-spacing:2.5px;font-weight:700}
</style>
</head>
<body>

<div class="header">
  <svg width="100%" height="52" viewBox="0 0 340 52" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="1" width="338" height="50" stroke="#000" stroke-width="2"/>
    <line x1="97" y1="1" x2="97" y2="51" stroke="#000" stroke-width="2"/>
    <text x="48" y="35" text-anchor="middle" fill="#000" font-family="Arial Black,sans-serif" font-size="26" font-weight="900" letter-spacing="3">GAP</text>
    <line x1="115" y1="26" x2="294" y2="26" stroke="#000" stroke-width="1.2"/>
    <line x1="308" y1="11" x2="308" y2="41" stroke="#000" stroke-width="1.6"/>
    <line x1="293" y1="26" x2="323" y2="26" stroke="#000" stroke-width="1.6"/>
    <line x1="297" y1="15" x2="319" y2="37" stroke="#000" stroke-width="1.2"/>
    <line x1="319" y1="15" x2="297" y2="37" stroke="#000" stroke-width="1.2"/>
    <line x1="294" y1="19" x2="322" y2="33" stroke="#000" stroke-width="0.7"/>
    <line x1="294" y1="33" x2="322" y2="19" stroke="#000" stroke-width="0.7"/>
  </svg>
  <div class="logo-sub">GLOBAL AND PERSONAL LOGISTICS</div>
  <div class="stats">
    <div class="stat">
      <div class="stat-n" style="color:#000" id="s-all">—</div>
      <div class="stat-l" style="color:#000">ВСЬОГО</div>
    </div>
    <div class="stat" style="border-color:#dc2626;background:#fff0f0">
      <div class="stat-n" style="color:#dc2626" id="s-transit">—</div>
      <div class="stat-l" style="color:#dc2626">В ДОРОЗІ</div>
    </div>
    <div class="stat" style="border-color:#15803d;background:#f0fff4">
      <div class="stat-n" style="color:#15803d" id="s-arrived">—</div>
      <div class="stat-l" style="color:#15803d">ПРИБУЛО</div>
    </div>
    <div class="stat">
      <div class="stat-n" style="color:#000" id="s-weight">—</div>
      <div class="stat-l" style="color:#000">ВАГА</div>
    </div>
  </div>
</div>

<div class="list" id="list">
  <div style="padding:40px;text-align:center;color:#aaa;font-size:13px">ЗАВАНТАЖЕННЯ...</div>
</div>
<div class="footer"><span>GLOBAL AND PERSONAL LOGISTICS</span></div>

<script>
const API_BASE='https://gaptrackinmaersk.onrender.com';
let DATA=[],openIdx=null;

const ST={
  IN_TRANSIT:{l:"В дорозі",    tc:"#dc2626",bar:"#dc2626"},
  ON_VESSEL: {l:"На судні",    tc:"#dc2626",bar:"#dc2626"},
  DEPARTED:  {l:"Відправлено", tc:"#000",   bar:"#000"},
  ARRIVED:   {l:"Прибуло",     tc:"#15803d",bar:"#15803d"},
  DISCHARGED:{l:"Розвантажено",tc:"#15803d",bar:"#15803d"},
  GATE_OUT:  {l:"На видачі",   tc:"#15803d",bar:"#15803d"},
  GATE_IN:   {l:"На терміналі",tc:"#555",   bar:"#555"},
  UNKNOWN:   {l:"Невідомо",    tc:"#bbb",   bar:"#bbb"},
};

const fmt=d=>{if(!d)return"—";try{return new Date(d).toLocaleDateString("uk-UA",{day:"numeric",month:"short"});}catch{return d;}};
const pct=(etd,eta)=>{if(!etd||!eta)return null;const s=+new Date(etd),e=+new Date(eta),n=Date.now();if(n>=e)return 100;if(n<=s)return 0;return Math.round((n-s)/(e-s)*100);};

async function loadData(){
  try{
    const res=await fetch(`${API_BASE}/api/containers`);
    if(!res.ok)throw new Error();
    const raw=await res.json();
    DATA=raw.map(c=>({
      n:c.number, name:c.cargo_name||'Вантаж', batch:c.batch||'—',
      s:c.status||'UNKNOWN', vessel:c.vessel_name||null,
      loc:c.current_location||'', dest:c.destination||'',
      eta:c.eta, etd:c.etd, weight:c.weight||'—',
      ev:c.last_event||'Дані оновлюються...', docs:[],
    }));
    const inT=DATA.filter(c=>["IN_TRANSIT","ON_VESSEL","DEPARTED"].includes(c.s)).length;
    const arr=DATA.filter(c=>["ARRIVED","DISCHARGED","GATE_OUT"].includes(c.s)).length;
    const kg=DATA.reduce((s,c)=>{const w=parseFloat((c.weight||"").replace(/\D/g,""));return s+(isNaN(w)?0:w);},0);
    document.getElementById('s-all').textContent=DATA.length||'0';
    document.getElementById('s-transit').textContent=inT||'0';
    document.getElementById('s-arrived').textContent=arr||'0';
    document.getElementById('s-weight').textContent=kg>0?Math.round(kg/1000)+'т':'—';
    render();
  }catch(e){
    document.getElementById("list").innerHTML='<div style="padding:40px;text-align:center;color:#aaa;font-size:13px;line-height:2">ПОМИЛКА ЗАВАНТАЖЕННЯ.<br>ПЕРЕВІРТЕ ПІДКЛЮЧЕННЯ.</div>';
  }
}

function render(){
  const list=document.getElementById("list");
  if(!DATA.length){list.innerHTML='<div style="padding:40px;text-align:center;color:#aaa;font-size:13px;letter-spacing:1px">КОНТЕЙНЕРІВ НЕМАЄ</div>';return;}
  list.innerHTML=DATA.map((c,i)=>{
    const st=ST[c.s]||ST.UNKNOWN;
    const p=pct(c.etd,c.eta);
    const isO=openIdx===i;
    const docs=(c.docs||[]).map(d=>`<div class="doc-item"><span style="font-size:18px">📄</span><span class="doc-name">${d}</span><span class="doc-ext">PDF</span></div>`).join("");
    return`<div class="card${isO?" open":""}" onclick="tog(${i})">
      <div class="ctop">
        <div class="crow">
          <div class="container-num">${c.n}</div>
          <span class="badge" style="color:${st.tc}">${st.l.toUpperCase()}</span>
        </div>
        <div class="cname">${c.name}</div>
        <div class="meta">
          <div class="ml">Партія<span>${c.batch}</span></div>
          <div class="ml r">Вага<span>${c.weight}</span></div>
          <div class="ml">Відправка<span>${fmt(c.etd)}</span></div>
          <div class="ml r">Прибуття<span class="red">${fmt(c.eta)}</span></div>
          ${c.vessel?`<div class="ml full">Судно<span>${c.vessel}</span></div>`:""}
        </div>
        ${p!==null?`<div class="prog">
          <div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${st.bar}"></div></div>
          <div class="prog-row"><span>${c.loc}</span><span style="color:${st.tc}">${p}%</span><span>${c.dest}</span></div>
        </div>`:""}
      </div>
      ${isO?`<div class="cbody">
        <div class="ev-row"><span style="font-size:16px;flex-shrink:0">📍</span><span class="etxt">${c.ev}</span></div>
        ${docs}
        <label class="attach" onclick="event.stopPropagation()">
          <span style="font-size:18px">📎</span><span class="atxt">Прикріпити PDF документ</span>
          <input type="file" accept=".pdf" style="display:none" onchange="addDoc(${i},this)">
        </label>
        <a class="maersk-btn" href="https://www.maersk.com/tracking/${c.n}" target="_blank" onclick="event.stopPropagation()">ВІДКРИТИ ТРЕКІНГ MAERSK →</a>
      </div>`:""}
    </div>`;
  }).join("");
}

function tog(i){openIdx=openIdx===i?null:i;render();}
function addDoc(i,inp){if(inp.files[0]){if(!DATA[i].docs)DATA[i].docs=[];DATA[i].docs.push(inp.files[0].name);openIdx=i;render();}}
loadData();
</script>
</body>
</html>
